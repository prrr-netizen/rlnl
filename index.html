<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CORE PLAY - 포인트 허브</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
<div class="landing-wrapper">
  <div class="landing-card">
    <header class="landing-header">
      <div class="landing-logo">
        <div class="landing-logo-icon">C</div>
        <div class="landing-logo-text">
          <div class="landing-logo-main">CORE PLAY</div>
          <div class="landing-logo-sub">Points · Games · Events</div>
        </div>
      </div>
      <span class="landing-status">● LOBBY</span>
    </header>

    <main class="landing-main">
      <h1>포인트 게임 라운지</h1>
      <p>간단한 포인트 미니게임과 이벤트를 한 곳에서 모아놓은 데모 허브입니다.</p>
      <div class="landing-feature-grid">
        <div class="landing-feature">
          <span class="feature-label">01</span>
          <div>
            <h2>간편 닉네임 로그인</h2>
            <p>별도 회원가입 없이 바로 입장.</p>
          </div>
        </div>
        <div class="landing-feature">
          <span class="feature-label">02</span>
          <div>
            <h2>포인트 지갑</h2>
            <p>충전·보너스로 포인트 관리.</p>
          </div>
        </div>
        <div class="landing-feature">
          <span class="feature-label">03</span>
          <div>
            <h2>이벤트 리스트</h2>
            <p>스포츠 대시보드 형식의 참여 화면.</p>
          </div>
        </div>
      </div>
    </main>

    <div class="landing-actions">
      <button class="btn btn-primary landing-enter" onclick="location.href='home.html'">
        입장하기
      </button>
      <button class="btn btn-outline" onclick="alert('이용 전에 안내사항을 꼭 읽어 주세요.');">
        이용 안내
      </button>
    </div>

    <footer class="landing-footer">
      <span>※ 본 서비스는 베팅/환전 기능이 없는 포인트 이벤트 데모 페이지입니다.</span>
    </footer>
  </div>
</div>
</body>
</html>
