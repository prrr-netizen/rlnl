<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>CORE PLAY - 포인트 허브</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="landing-body">
<div class="landing-wrapper">
  <div class="landing-card">
    <div class="landing-logo">
      <div class="landing-logo-icon">C</div>
      <div class="landing-logo-text">
        <div class="landing-logo-main">CORE PLAY</div>
        <div class="landing-logo-sub">포인트 게임 · 이벤트 허브</div>
      </div>
    </div>

    <div class="landing-content">
      <h1>프리미엄 포인트 게임 라운지</h1>
      <p>실제 베팅 없이, 포인트로 즐기는 미니게임과 이벤트 허브입니다.</p>
      <ul>
        <li>간편 닉네임 로그인</li>
        <li>포인트 지갑 & 출석 보너스</li>
        <li>경기 리스트처럼 보이는 이벤트 참여</li>
      </ul>
    </div>

    <div class="landing-actions">
      <button class="btn btn-primary landing-enter" onclick="location.href='home.html'">
        입장하기
      </button>
      <button class="btn btn-outline" onclick="alert('이용 전에 안내사항을 꼭 읽어 주세요.');">
        이용 안내
      </button>
    </div>

    <div class="landing-footer">
      <span>※ 본 서비스는 베팅/환전 기능이 없는 포인트 이벤트 데모 페이지입니다.</span>
    </div>
  </div>
</div>
</body>
</html>
