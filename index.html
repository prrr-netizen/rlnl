<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>PLAY - 실시간 포인트 허브 (잠금)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #22c55e33, transparent 55%),
        radial-gradient(circle at 100% 0%, #3b82f633, transparent 55%),
        radial-gradient(circle at 50% 120%, #0ea5e955, #020617 70%),
        #020617;
      color:#e5e7eb;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 10px;
    }

    .landing-wrapper{
      width:100%;
      max-width:960px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .landing-card{
      width:100%;
      max-width:560px;
      background:
        radial-gradient(circle at -10% -10%, rgba(34,197,94,.4), transparent 60%),
        radial-gradient(circle at 110% -10%, rgba(59,130,246,.4), transparent 60%),
        radial-gradient(circle at 50% 120%, rgba(14,165,233,.45), #020617 70%),
        #020617;
      border-radius:20px;
      border:1px solid rgba(148,163,184,.75);
      box-shadow:
        0 0 60px rgba(59,130,246,.7),
        0 22px 40px rgba(0,0,0,.95);
      padding:22px 20px 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
      overflow:hidden;
    }

    .landing-card::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:
        radial-gradient(circle at 0% 0%, rgba(34,197,94,.22), transparent 55%),
        radial-gradient(circle at 100% 0%, rgba(59,130,246,.22), transparent 55%);
      opacity:.9;
      z-index:-1;
    }

    .landing-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:4px;
    }
    .landing-logo{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .landing-logo-icon{
      width:34px;
      height:34px;
      border-radius:11px;
      background:radial-gradient(circle at 30% 0,#22c55e,#0f172a);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:18px;
      box-shadow:0 0 18px rgba(34,197,94,.9);
    }
    .landing-logo-main{
      font-size:16px;
      font-weight:800;
      letter-spacing:.04em;
    }
    .landing-logo-sub{
      font-size:11px;
      color:#9ca3af;
    }

    .landing-status{
      font-size:10px;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid rgba(234,179,8,.9);
      background:rgba(234,179,8,.18);
      color:#facc15;
      text-shadow:0 0 4px rgba(250,204,21,1);
    }

    .landing-main h1{
      font-size:19px;
      margin-bottom:6px;
    }
    .landing-main p{
      font-size:13px;
      color:#d1d5db;
      margin-bottom:10px;
      line-height:1.5;
    }

    .locked-box{
      border-radius:12px;
      border:1px solid rgba(248,250,252,.18);
      background:rgba(15,23,42,.96);
      padding:9px 10px 8px;
      margin-bottom:8px;
      box-shadow:0 0 18px rgba(15,23,42,.9);
      font-size:12px;
    }
    .locked-title{
      font-size:13px;
      font-weight:600;
      margin-bottom:3px;
      color:#facc15;
    }
    .locked-text{
      font-size:12px;
      color:#e5e7eb;
    }

    .landing-actions{
      display:flex;
      gap:8px;
      margin-top:10px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      cursor:pointer;
      font-weight:600;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      transition:transform .12s ease, box-shadow .12s ease, background .12s ease, color .12s ease;
    }
    .btn-primary{
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:#020617;
      box-shadow:0 0 18px rgba(34,197,94,.7);
    }
    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 0 26px rgba(34,197,94,.9);
    }
    .btn-outline{
      background:rgba(15,23,42,.9);
      color:#e5e7eb;
      border:1px solid rgba(148,163,184,.8);
      box-shadow:0 0 10px rgba(15,23,42,.9);
    }
    .btn-outline:hover{
      background:radial-gradient(circle at 0 0,#22c55e26,transparent 55%);
    }

    .btn-disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .landing-footer{
      margin-top:6px;
      font-size:10px;
      color:#6b7280;
    }

    @media(max-width:640px){
      .landing-card{
        padding:18px 14px 14px;
        max-width:100%;
      }
      .landing-actions{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="landing-wrapper">
    <div class="landing-card">
      <header class="landing-header">
        <div class="landing-logo">
          <div class="landing-logo-icon">C</div>
          <div>
            <div class="landing-logo-main">PLAY</div>
            <div class="landing-logo-sub">실시간 룸 · 포인트 허브</div>
          </div>
        </div>
        <div class="landing-status" id="landing-status">● ACCESS LOCKED</div>
      </header>

      <main class="landing-main">
        <h1>실시간 포인트 허브는 지금 사전 점검 중입니다</h1>
        <p>
          내부 테스트/점검 구간으로,<br>
          현재는 운영진 승인 없이는 홈 화면 및 실시간 룸에 진입할 수 없습니다.
        </p>

        <div class="locked-box">
          <div class="locked-title">접속 안내</div>
          <div class="locked-text">
            - 사전 승인된 테스터만 개별 링크로 접속 가능합니다.<br>
            - 일반 유저는 아래 디스코드 문의 채널로 연락해 주세요.<br>
            - 접속 URL 공유·무단 이용 시 서비스에서 차단될 수 있습니다.
          </div>
        </div>

        <div class="landing-actions">
          <button class="btn btn-primary btn-disabled" id="go-home-btn" disabled>
            포인트 허브 입장 (잠김)
          </button>
          <button class="btn btn-outline" id="go-discord-btn">
            디스코드 문의하기
          </button>
        </div>
        <div class="landing-footer">
          디스코드 문의 시, 접속을 원하는 닉네임 / 사용 목적을 함께 남겨 주시면 확인 후 개별 안내드립니다.
        </div>
      </main>
    </div>
  </div>

  <script>
    // 상태 텍스트에 시간만 표시 (잠금 상태 유지)
    const statusEl = document.getElementById('landing-status');
    setInterval(()=>{
      const now = new Date();
      const t = now.toTimeString().slice(0,5);
      statusEl.textContent = `● ACCESS LOCKED | ${t}`;
    }, 1000);

    // 홈 이동 버튼은 아예 동작 막기 (잠금)
    document.getElementById('go-home-btn').addEventListener('click', (e) => {
      e.preventDefault();
      alert('현재 홈 화면은 잠겨 있으며, 디스코드 문의 후 개별 안내로만 접속 가능합니다.');
    });

    // 디스코드 문의 버튼
    document.getElementById('go-discord-btn').addEventListener('click', () => {
      // 여기에 실제 디스코드 초대/문의 링크 넣어
      window.open('https://discord.gg/yEym2KZ9BU', '_blank');
    });
  </script>
</body>
</html>
